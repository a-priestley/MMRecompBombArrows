[manifest]

id = "mm_recomp_bomb_arrows"

version = "1.0.1"

display_name = "Bomb Arrows"

description = """
Adds the ability to combine arrows with bombs like in other Zelda titles. \
Fasten a bomb to the tip of an arrow, causing it to detonate on impact or when the fuse expires.

To use bomb arrows, assign both the Hero's Bow and Bombs to the same control button. \
Each bomb arrow consumes one arrow and one bomb."""

short_description = "Combine arrows with bombs for explosive projectiles."

authors = ["PK Cheap"]

game_id = "mm"

minimum_recomp_version = "1.2.2"

dependencies = ["mm_recomp_interface_helper:1.1.0"]

optional_dependencies = []

native_libraries = []

[inputs]

elf_path = "build/mod.elf"

mod_filename = "mm_recomp_bomb_arrows"

func_reference_syms_file = "Zelda64RecompSyms/mm.us.rev1.syms.toml"
data_reference_syms_files = [
	"Zelda64RecompSyms/mm.us.rev1.datasyms.toml",
	"Zelda64RecompSyms/mm.us.rev1.datasyms_static.toml",
]

additional_files = ["thumb.dds"]

[[manifest.config_options]]
id = "defuse_on_submerge"
name = "Bombs Defuse When Submerged"
description = "Bomb arrows will be defused and despawned when plunged into water."
type = "Enum"
options = ["on", "off"]
default = "on"

[[manifest.config_options]]
id = "detonate_on_flyer_impact"
name = "Bombs Detonate on Impact with Small Flying Enemies"
description = """Normal arrow behavior when impacting enemies such as keese or guay
is to continue its flight path, applying its momentum to the struck flyer.
Enable this option for immediate detonation instead.
Useful for felling entire flocks."""
type = "Enum"
options = ["on", "off"]
default = "off"
